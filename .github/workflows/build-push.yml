name: Build and push image

on:
  push:
    branches:
      - "**"

env:
  IMAGE: quay.io/makentenza/trustee-openshift-console-plugin

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        env:
          REF: ${{ github.ref_name }}
        run: |
          if [[ "$REF" == "main" ]]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            # Docker tags can't contain '/' (e.g. fix/foo) or other special chars; map them to '-'.
            echo "tag=$(printf '%s' "$REF" | sed 's#[^a-zA-Z0-9._-]#-#g')" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
